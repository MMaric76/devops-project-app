apiVersion: v1
kind: ServiceAccount
metadata:
  name: ticketing-sa
  namespace: ticketing
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ticketing-reader
  namespace: ticketing
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ticketing-reader-binding
  namespace: ticketing
subjects:
  - kind: ServiceAccount
    name: ticketing-sa
    namespace: ticketing
roleRef:
  kind: Role
  name: ticketing-reader
  apiGroup: rbac.authorization.k8s.io